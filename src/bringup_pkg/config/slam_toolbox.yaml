slam_toolbox:
  ros__parameters:
    use_sim_time: false
    mode: mapping
    map_frame: map 
    odom_frame: odom
    base_frame: base_link
    scan_topic: /scan
    transform_publish_period: 0.02   # map->odom 변환 주기
    map_update_interval: 2.0
    resolution: 0.05                 # map 해상도, [m]
    max_laser_range: 15.0            # map작성에 사용할 레이저 포인트 범위
    throttle_scans: 1
    debug_logging: false
